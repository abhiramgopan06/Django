<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Edit student</h1>
    <form action="" method="post">
        {% csrf_token %}
        <table>
            <tr>
                <td><label for="">Name:</label></td>
                <td><input type="text"placeholder="Enter name" name="name" value="{{student.name}}"></td>
            </tr>
            <tr>
                <td>
                    <label for="">course:
                    <select name="course" id="">
                        <option value="" disabled selected>--Select course--</option>
                        {% for course in courses %}
                            <option value="{{course.id}}" {% if student.course == course %} selected {% endif %}>{{course.name}}</option>
                        {% endfor %}
                        </label>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="">sid:</label></td>
                <td><input type="text"placeholder="Enter sid" name="sid" value="{{student.sid}}" readonly></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><button type="submit">Edit Student</button></td>
            </tr>
        </table>
    </form>
</body>
</html>
