<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Add student</h1>
    <form action="../add/" method="post">
        {% csrf_token %}
        <table>
            <tr>
                <td><label for="">Name:</label></td>
                <td><input type="text"placeholder="Enter name" name="name"></td>
            </tr>
            <tr>
                <td><label for="">Course:</label></td>
                <td><input type="text"placeholder="Enter course" name="course"></td>
            </tr>
            <tr>
                <td><label for="">sid:</label></td>
                <td><input type="text"placeholder="Enter sid" name="sid"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><button type="submit">Add Student</button></td>
            </tr>
        </table>
    </form>
</body>
</html>
