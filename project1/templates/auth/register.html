<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>Register</h1>
    <form action="" method="post">
        {% csrf_token %}
        {% if error %}
        {{error}}
        {% endif %}
        <table>
            <tr>
                <td><label for="">Username: </label></td>
                <td><input type="text" placeholder="Enter username" name="username"></td>
            </tr>
            <tr>
                <td><label for="">Password: </label></td>
                <td><input type="password" placeholder="Enter password" name="password"></td>
            </tr>
            <tr>
                <td><label for="">Confirm Password: </label></td>
                <td><input type="password" placeholder="Confirm your password" name="cpassword"></td>
            </tr>
            <tr>
                <td><label for="">Email: </label></td>
                <td><input type="email" placeholder="Enter Email" name="email"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><button type="submit">Register</button></td>
            </tr>
        </table>
    </form>
</body>
</html>
